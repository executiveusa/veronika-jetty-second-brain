<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f0a12">
<title>Jetty&trade; - Your AI Second Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app-style.css">
<script src="/config.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/",
    "3d-force-graph": "https://esm.sh/3d-force-graph@1.73.4?external=three",
    "three-spritetext": "https://esm.sh/three-spritetext@1.8.2?external=three"
  }
}
</script>
</head>
<body>

<div id="galaxy-canvas" aria-hidden="true"></div>

<header id="nav" role="banner">
  <button id="toggle-sessions-btn" class="nav-icon-btn" aria-label="Toggle chat history" title="Toggle chat history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </button>

  <a id="brand-mark" href="/" aria-label="Return to Jetty home">
    <div class="jetty-orb" id="orb" aria-hidden="true">
      <div class="orb-core"></div>
      <div class="orb-ring"></div>
    </div>
    <div class="brand-text">
      <span class="brand-name">JETTY&trade;</span>
      <span class="brand-city">Salt Lake City</span>
    </div>
  </a>

  <div id="nav-controls">
    <div class="nav-pill" id="voice-pill">
      <span class="pill-label">Voice</span>
      <select id="voice-select" title="Choose voice" aria-label="Choose voice"></select>
    </div>
    <div class="nav-pill" id="brain-pill">
      <span class="pill-label">Brain</span>
      <select id="model-select" title="Choose AI model" aria-label="Choose AI model">
        <option value="anthropic">Claude</option>
        <option value="openai">ChatGPT / OpenAI</option>
        <option value="synthia">ChatGPT via Synthia</option>
        <option value="groq">Groq (Free)</option>
        <option value="deepseek">DeepSeek</option>
        <option value="mistral">Mistral (Free)</option>
        <option value="hermes">Hermes</option>
      </select>
    </div>
    <div class="nav-pill status-pill">
      <span class="status-indicator" id="status-dot"></span>
      <span id="status-text">ready</span>
    </div>
    <button id="toggle-knowledge-btn" class="nav-icon-btn" aria-label="Toggle knowledge vault" title="Toggle knowledge vault">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </div>
</header>

<aside id="sessions-sidebar" class="sidebar-hidden" role="complementary" aria-label="Chat threads">
  <div class="sidebar-header">
    <span class="panel-eyebrow">Previous chats</span>
    <div class="sidebar-actions">
      <button type="button" id="new-chat-btn" title="Start a new chat session">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align: middle; margin-right: 4px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>New
      </button>
      <button type="button" id="clear-history-btn" title="Clear view">Clear</button>
    </div>
  </div>
  <div id="history-list" class="history-list-box"></div>
</aside>

<aside id="knowledge-panel" class="panel-hidden" role="complementary" aria-label="Knowledge vault">
  <div class="panel-eyebrow">Your knowledge vault</div>
  <h1 id="panel-headline">Your thinking, coiled.</h1>
  <p class="panel-body" id="panel-subtext">Each star is a note. Each connection is a relationship Jetty found between your ideas.</p>
  <div id="source-view" aria-live="polite"></div>
  <div id="quick-questions">
    <p class="panel-eyebrow" style="margin-top:20px">Ask Jetty</p>
    <button class="quick-q" onclick="ask('How do I export my data from ChatGPT?')">Export ChatGPT history</button>
    <button class="quick-q" onclick="ask('What free AI tools should I be using?')">Free AI tools guide</button>
    <button class="quick-q" onclick="ask('Help me write a cover letter for a SLC startup')">Cover letter for SLC</button>
    <button class="quick-q" onclick="ask('Which Silicon Slopes companies are hiring in ops?')">SLC ops jobs now</button>
  </div>
</aside>

<main id="chat-container">
  <div id="chat-conversation" role="log" aria-live="polite" aria-label="Conversation history">
    <!-- Message bubbles will be dynamically rendered here -->
  </div>

  <section id="chat-dock" role="main" aria-label="Chat with Jetty">
    <button id="mic-btn" class="icon-btn" title="Speak to Jetty" aria-label="Start voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    </button>

    <div class="dock-buttons" aria-label="Advanced voice controls">
      <button id="j-wake" class="dock-btn" title="Hands-free — say &quot;Jetty…&quot;" aria-label="Hands-free wake word">👂</button>
      <button id="j-live" class="dock-btn" title="Live conversation" aria-label="Live conversation">📡</button>
      <button id="j-screen" class="dock-btn" title="Share your screen so Jetty can see it" aria-label="Share screen">🖥</button>
      <button id="j-bell" class="dock-btn" title="Morning briefing" aria-label="Morning briefing">🔔</button>
    </div>

    <div class="input-column">
      <textarea id="query-input"
        placeholder="Ask · &quot;remember that…&quot; · &quot;good morning&quot; · &quot;switch to claude&quot;"
        autocomplete="off"
        rows="1"
        aria-label="Message Jetty"></textarea>
      <div id="answer-display" aria-live="polite" aria-atomic="true"></div>
    </div>

    <button id="send-btn" class="send-btn" aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </section>
</main>

<div id="toast-msg" role="alert" aria-live="assertive"></div>

<!-- Reactor HUD (Iron-Man-style orb, Spiral Jetty palette) -->
<div id="j-state" aria-hidden="true"><span class="dot"></span><span id="j-state-txt">ONLINE</span></div>
<div id="j-orb" aria-hidden="true">
  <svg viewBox="0 0 200 200">
    <defs>
      <radialGradient id="hudCore" cx="50%" cy="45%" r="62%">
        <stop offset="0%" stop-color="#3c061e"/><stop offset="70%" stop-color="#2a0414"/>
        <stop offset="100%" stop-color="#0f0a12"/>
      </radialGradient>
    </defs>
    <g class="hud-pulse glow">
      <circle class="rot rot-b s-hud" cx="100" cy="100" r="86" stroke-width="3.4" stroke-dasharray="48 30" stroke-linecap="round"/>
      <circle class="s-hud2" cx="100" cy="100" r="79" stroke-width="1" opacity="0.45"/>
      <circle class="rot rot-c s-accent" cx="100" cy="100" r="70" stroke-width="4.2" stroke-dasharray="122 318" stroke-linecap="round"/>
      <circle class="rot rot-d s-hud" cx="100" cy="100" r="55" stroke-width="1.2" stroke-dasharray="2 6" opacity="0.7"/>
      <circle class="s-hud2" cx="100" cy="100" r="40" stroke-width="1" opacity="0.4"/>
      <circle class="core-glow" cx="100" cy="100" r="37"/>
      <circle class="core-disc" cx="100" cy="100" r="32"/>
      <circle class="core-lobe" cx="100" cy="100" r="32"/>
      <circle class="core-rim" cx="100" cy="100" r="32" stroke-width="1.2"/>
      <text class="hud-label" x="100" y="103.5" text-anchor="middle">JETTY</text>
    </g>
  </svg>
</div>

<footer id="app-footer" aria-label="Beta notice">Beta system. We appreciate your feedback.</footer>

<!-- Onboarding overlay (first-launch guided tour) -->
<div id="onboarding" hidden>
  <div class="onboard-backdrop"></div>
  <div class="onboard-card" role="dialog" aria-modal="true" aria-labelledby="onboard-title">
    <div class="onboard-step" id="onboard-step-indicator">1 / 5</div>
    <h2 id="onboard-title">Meet Jetty</h2>
    <p id="onboard-body"></p>
    <div class="onboard-actions">
      <button type="button" id="onboard-skip" class="onboard-skip">Skip</button>
      <button type="button" id="onboard-next" class="onboard-next">Next →</button>
    </div>
  </div>
</div>

<script type="module" src="/assets/app.js"></script>
<script type="module" src="/assets/onboarding.js"></script>
</body>
</html>
