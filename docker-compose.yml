version: '3.9'

services:
  jetty:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jetty-tm
    ports:
      - "${PORT:-4700}:4700"
    environment:
      APP_NAME:           ${APP_NAME:-JETTY™}
      APP_REGION:         ${APP_REGION:-Salt Lake City, Utah}
      MODEL_PROVIDER:     ${MODEL_PROVIDER:-groq}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL:    ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      OPENAI_API_KEY:     ${OPENAI_API_KEY}
      OPENAI_MODEL:       ${OPENAI_MODEL:-gpt-4o-mini}
      SYNTHIA_GATEWAY_BASE_URL: ${SYNTHIA_GATEWAY_BASE_URL}
      SYNTHIA_GATEWAY_API_KEY:  ${SYNTHIA_GATEWAY_API_KEY}
      SYNTHIA_GATEWAY_MODEL:    ${SYNTHIA_GATEWAY_MODEL:-gpt-4o-mini}
      GROQ_API_KEY:       ${GROQ_API_KEY}
      GROQ_MODEL:         ${GROQ_MODEL:-llama-3.3-70b-versatile}
      DEEPSEEK_API_KEY:   ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL:     ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      MISTRAL_API_KEY:    ${MISTRAL_API_KEY}
      MISTRAL_MODEL:      ${MISTRAL_MODEL:-mistral-small-latest}
      HERMES_AGENT_API:   ${HERMES_AGENT_API}
      HERMES_BASE_URL:    ${HERMES_BASE_URL:-https://inference-api.nousresearch.com/v1}
      COMPOSIO_API_TOKEN: ${COMPOSIO_API_TOKEN}
      ALLOWED_ORIGINS:    ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3001}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-45}
      MAX_HISTORY:        ${MAX_HISTORY:-10}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:4700}
    volumes:
      - ./notes:/app/notes
      - ./ops:/app/ops
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4700/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
